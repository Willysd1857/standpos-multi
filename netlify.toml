# ===================================================
# Netlify Configuration for StandPOS Frontend
# ===================================================
# The frontend is hosted on Netlify (static files).
# All /api/* requests are proxied to the backend on Render.
#
# IMPORTANT: After deploying your backend on Render,
# replace RENDER_BACKEND_URL below with your actual URL.
# Example: https://standpos-api.onrender.com
# ===================================================

[build]
  command = "npm run build"
  publish = "dist"

# Proxy all API calls to the Render backend
# Status 200 = reverse proxy (invisible to the browser, no redirect)
[[redirects]]
  from = "/api/*"
  to = "https://VOTRE_URL_RENDER.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback: serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
