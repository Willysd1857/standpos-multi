# ===================================================
# Netlify Configuration for StandPOS Frontend
# ===================================================
# The frontend is hosted on Netlify (static files).
# All /api/* requests are proxied to the backend on Render.
# ===================================================

[build]
  command = "npm run build"
  publish = "dist"

# Proxy all API calls to the Render backend
# Status 200 = reverse proxy (invisible to the browser, no redirect)
[[redirects]]
  from = "/api/*"
  to = "https://onrender.com"
  status = 200
  force = true

# SPA fallback: serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
