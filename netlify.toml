[build]
  command = "npm run build"
  publish = "dist"

# Redirection de toutes les requêtes /api vers votre VRAI serveur Render
[[redirects]]
  from = "/api/*"
  to = "https://onrender.com"
  status = 200
  force = true

# Fallback pour les applications SPA (React/Vite)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
